<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Zapia Control — HQ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#04040a;color:#fff;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh}
#tabs{display:flex;background:#080816;border-bottom:1px solid #1a1a3a;z-index:10;position:relative}
.tab{flex:1;padding:12px 0;text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:#556;transition:all .2s;border-bottom:3px solid transparent}
.tab.active{color:#fff;border-bottom-color:#f0a800}
#screens{width:100%;height:calc(100vh - 43px);position:relative}
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:stretch;background:#04040a}
.screen.active{display:flex}

/* P1 - Panel de Órdenes */
#screen-p1{background:#020208;padding:15px;overflow-y:auto;font-family:'Courier New',monospace}
.order-card{background:rgba(20,20,35,0.6);border-left:4px solid #f0a800;padding:12px;margin-bottom:10px;border-radius:4px;animation:fadeIn 0.3s ease}
.order-ts{color:#556;font-size:10px;margin-bottom:4px}
.order-title{color:#f0a800;font-weight:bold;font-size:12px;margin-bottom:4px}
.order-msg{color:#cceeff;font-size:11px;line-height:1.4}
.order-ok{border-left-color:#00ff88}

/* P2 - Zapia Screen */
#p2-topbar{background:#0a0a1a;border-bottom:1px solid #1a1a3a;padding:8px 15px;display:flex;align-items:center;gap:12px}
#p2-url{flex:1;background:#111;border:1px solid #222;border-radius:6px;padding:4px 10px;font-size:11px;color:#889;font-family:monospace;white-space:nowrap;overflow:hidden}
#p2-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000;position:relative}
#p2-img{max-width:100%;max-height:100%;object-fit:contain;transition:opacity .3s}

/* VS Split */
#screen-vs{flex-direction:row!important}
.half{flex:1;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}
.divider{width:2px;background:linear-gradient(to bottom,transparent,#334,transparent);flex-shrink:0}

@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.dot{width:8px;height:8px;border-radius:50%;background:#00ff88;animation:pulse 1.2s ease infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="tabs">
  <div class="tab active" onclick="show('p1')">P1 — Gestión de Órdenes</div>
  <div class="tab"        onclick="show('p2')">P2 — Zapia Screen (Vivo)</div>
  <div class="tab"        onclick="show('vs')">AMBAS (VS)</div>
</div>

<div id="screens">
  <!-- P1 -->
  <div id="screen-p1" class="screen active">
    <div style="font-size:10px;color:#445;margin-bottom:15px;letter-spacing:1px">SISTEMA DE ÓRDENES EN VIVO 🔴</div>
    <div id="orders-container"></div>
  </div>

  <!-- P2 -->
  <div id="screen-p2" class="screen">
    <div id="p2-topbar">
      <div style="display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;color:#00ff88"><div class="dot"></div>LIVE</div>
      <div id="p2-url">https://www.youtube.com/results?search_query=calle+latina</div>
    </div>
    <div id="p2-img-wrap">
      <img id="p2-img" src="" style="opacity:0"/>
    </div>
    <div style="background:#0a0a1a;padding:5px 15px;font-size:10px;color:#445;display:flex;justify-content:space-between">
      <span id="p2-status">🟢 Conectado</span>
      <span id="p2-time"></span>
    </div>
  </div>

  <!-- VS -->
  <div id="screen-vs" class="screen">
    <div class="half" id="vs-orders" style="padding:10px;overflow-y:auto">
      <div style="font-size:9px;color:#334;margin-bottom:10px">P1 · ÓRDENES</div>
    </div>
    <div class="divider"></div>
    <div class="half" style="background:#000">
      <img id="p2-img-vs" src="" style="max-width:100%;max-height:100%;object-fit:contain"/>
      <div style="position:absolute;top:8px;left:8px;font-size:9px;color:#00ff88;font-weight:bold;background:rgba(0,0,0,0.5);padding:2px 6px;border-radius:4px">P2 · SCREEN</div>
    </div>
  </div>
</div>

<script>
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  const idx = {p1:0,p2:1,vs:2}[id];
  document.querySelectorAll('.tab')[idx].classList.add('active');
}

const ordersCont = document.getElementById('orders-container');
const vsOrdersCont = document.getElementById('vs-orders');
let lastLogCount = 0;

function addOrder(entry){
  const card = document.createElement('div');
  card.className = 'order-card' + (entry.tipo==='ok' ? ' order-ok' : '');
  card.innerHTML = `
    <div class="order-ts">${entry.ts}</div>
    <div class="order-title">${entry.msg.split('→')[0]}</div>
    <div class="order-msg">${entry.msg.includes('→') ? entry.msg.split('→')[1] : entry.msg}</div>
  `;
  ordersCont.prepend(card);
  
  // Clonar para la vista VS
  const vsCard = card.cloneNode(true);
  vsOrdersCont.appendChild(vsCard);
  vsOrdersCont.scrollTop = vsOrdersCont.scrollHeight;
}

async function fetchLogs(){
  try{
    const r = await fetch('https://raw.githubusercontent.com/rayzemartineztv/zapia-visor/main/logs.json?v='+Date.now());
    if(!r.ok) return;
    const logs = await r.json();
    if(logs.length > lastLogCount){
      const nuevos = logs.slice(lastLogCount);
      nuevos.forEach(addOrder);
      lastLogCount = logs.length;
    }
  }catch(e){}
}

// Polling P2
const p2img=document.getElementById('p2-img'),p2imgvs=document.getElementById('p2-img-vs'),p2time=document.getElementById('p2-time'),p2url=document.getElementById('p2-url');
let lastPtr='';
async function poll(){
  try{
    const r=await fetch('https://raw.githubusercontent.com/rayzemartineztv/zapia-visor/main/pointer.txt?v='+Date.now());
    if(!r.ok) return;
    const ptr=(await r.text()).trim();
    if(ptr && ptr!==lastPtr){
      lastPtr=ptr;
      const tmp=new Image();
      tmp.onload=()=>{
        p2img.src=p2imgvs.src=tmp.src; p2img.style.opacity=1;
        p2time.textContent=new Date().toLocaleTimeString('es-CL');
      };
      tmp.src='https://raw.githubusercontent.com/rayzemartineztv/zapia-visor/main/'+ptr;
    }
    const mr=await fetch('https://raw.githubusercontent.com/rayzemartineztv/zapia-visor/main/screen_meta.json?v='+Date.now());
    if(mr.ok){const m=await mr.json(); p2url.textContent=m.url;}
  }catch(e){}
}

setInterval(fetchLogs, 2000); fetchLogs();
setInterval(poll, 2500); poll();
</script>
</body>
</html>
