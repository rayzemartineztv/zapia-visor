<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Zapia Visor — Live</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;color:#fff;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh}
#tabs{display:flex;background:#0a0a1a;border-bottom:1px solid #1a1a3a;z-index:10;position:relative}
.tab{flex:1;padding:10px 0;text-align:center;cursor:pointer;font-size:13px;font-weight:600;letter-spacing:.5px;color:#556;transition:all .2s;border-bottom:3px solid transparent}
.tab.active{color:#fff;border-bottom-color:#f0a800}
.tab:hover:not(.active){color:#aaa}
#screens{width:100%;height:calc(100vh - 43px);position:relative}
.screen{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#050510}
.screen.active{display:flex}

/* P1 / P2 canvas layout */
.canvas-wrap{position:relative;width:100%;height:100%}
canvas{display:block;width:100%;height:100%}
.hud{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.55);padding:5px 14px;border-radius:20px;
  font-size:11px;color:#aaa;letter-spacing:.3px;white-space:nowrap;pointer-events:none}
.badge{position:absolute;top:10px;left:12px;font-size:10px;font-weight:700;
  letter-spacing:1px;padding:3px 10px;border-radius:12px;pointer-events:none}
.badge-p1{background:rgba(255,168,0,.18);color:#f0a800;border:1px solid #f0a80055}
.badge-p2{background:rgba(0,220,255,.14);color:#00dcff;border:1px solid #00dcff55}

/* VS screen */
#screen-vs{flex-direction:row}
#screen-vs .half{flex:1;height:100%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
#screen-vs .divider{width:2px;background:linear-gradient(to bottom,transparent,#333,transparent);flex-shrink:0}

/* P3 YouTube */
#screen-p3{flex-direction:column}
#yt-wrap{width:100%;flex:1;position:relative}
#yt-wrap iframe{width:100%;height:100%;border:none}

/* Zapia Activity log (P2 overlay) */
#activity-log{position:absolute;bottom:38px;left:10px;right:10px;max-height:38%;
  overflow-y:auto;pointer-events:none;display:flex;flex-direction:column;gap:3px}
.log-line{font-size:10.5px;padding:3px 8px;border-radius:6px;
  background:rgba(0,0,0,.6);border-left:3px solid #00dcff;
  color:#cceeff;line-height:1.4;animation:fadeIn .25s ease}
.log-line.warn{border-left-color:#f0a800;color:#ffe5a0}
.log-line.ok{border-left-color:#00ff88;color:#aaffcc}
.log-line.error{border-left-color:#ff4455;color:#ffaaaa}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="tabs">
  <div class="tab active" onclick="show('p1')">P1 — Canvas Dorado</div>
  <div class="tab"        onclick="show('p2')">P2 — En Vivo 🟢</div>
  <div class="tab"        onclick="show('vs')">Ambas VS</div>
  <div class="tab"        onclick="show('p3')">P3 — YouTube</div>
</div>

<div id="screens">

  <!-- P1 -->
  <div id="screen-p1" class="screen active">
    <div class="canvas-wrap">
      <canvas id="c1"></canvas>
      <div class="badge badge-p1">P1 · CANVAS NATIVO · 60FPS</div>
      <div class="hud" id="hud1">— fps · — ms</div>
    </div>
  </div>

  <!-- P2 LIVE -->
  <div id="screen-p2" class="screen">
    <div class="canvas-wrap">
      <canvas id="c2"></canvas>
      <div class="badge badge-p2">P2 · EN VIVO · ZAPIA BUILDING 🔴</div>
      <div id="activity-log"></div>
      <div class="hud" id="hud2">— fps · — ms</div>
    </div>
  </div>

  <!-- VS -->
  <div id="screen-vs" class="screen">
    <div class="half" id="vs-left">
      <canvas id="c3"></canvas>
      <div class="badge badge-p1" style="top:8px;left:8px;font-size:9px">P1 DORADO</div>
    </div>
    <div class="divider"></div>
    <div class="half" id="vs-right">
      <canvas id="c4"></canvas>
      <div class="badge badge-p2" style="top:8px;left:8px;font-size:9px">P2 EN VIVO</div>
    </div>
  </div>

  <!-- P3 YouTube -->
  <div id="screen-p3" class="screen">
    <div id="yt-wrap">
      <iframe id="yt-frame"
        src="https://www.youtube.com/embed/epbtOnRgA4c?autoplay=1&mute=1&controls=1&rel=0&vq=hd2160&loop=1&playlist=epbtOnRgA4c"
        allow="autoplay;fullscreen;picture-in-picture" allowfullscreen></iframe>
    </div>
  </div>
</div>

<script>
// ─── Tab routing ───────────────────────────────────────────────
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  const idx = {p1:0,p2:1,vs:2,p3:3}[id];
  document.querySelectorAll('.tab')[idx].classList.add('active');
}

// ─── Activity Log (P2) ────────────────────────────────────────
const logEl = document.getElementById('activity-log');
const LOG_MAX = 18;
function addLog(msg, type=''){
  const d = document.createElement('div');
  d.className = 'log-line' + (type ? ' '+type : '');
  const ts = new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  d.textContent = `${ts}  ${msg}`;
  logEl.appendChild(d);
  while(logEl.children.length > LOG_MAX) logEl.removeChild(logEl.firstChild);
  logEl.scrollTop = logEl.scrollHeight;
}

// ─── Heart 3D renderer ────────────────────────────────────────
function makeHeartRenderer(canvas, colorScheme, onFrame){
  const ctx = canvas.getContext('2d');
  let fn = 0, lastT = 0, fps = 0, frameCount = 0, fpsTimer = 0;

  function resize(){
    canvas.width  = canvas.offsetWidth  * window.devicePixelRatio;
    canvas.height = canvas.offsetHeight * window.devicePixelRatio;
  }
  resize();
  window.addEventListener('resize', resize);

  function drawHeart(ts){
    const dt = ts - lastT; lastT = ts;
    frameCount++;
    fpsTimer += dt;
    if(fpsTimer >= 500){ fps = frameCount/(fpsTimer/1000)|0; frameCount=0; fpsTimer=0; }

    const W = canvas.width, H = canvas.height;
    // Fondo con fade suave
    ctx.fillStyle = 'rgba(5,5,16,.38)';
    ctx.fillRect(0,0,W,H);

    const beat  = 1 + 0.08 * Math.sin(fn * 0.18);
    const angle = (fn * 0.018) % (2*Math.PI);
    const cx = W/2, cy = H/2 + H*0.03;
    const scale = Math.min(W,H) * 0.105;

    // Generar puntos 3D del corazón
    const pts3=[], N=300;
    for(let i=0;i<=N;i++){
      const t=2*Math.PI*i/N;
      let x = 16*Math.pow(Math.sin(t),3)*0.3*beat;
      let y = (13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))*0.3*beat;
      let z = 8*Math.sin(t)*Math.cos(t)*0.3*beat;
      const rx = x*Math.cos(angle)+z*Math.sin(angle);
      const rz =-x*Math.sin(angle)+z*Math.cos(angle);
      pts3.push([rx,y,rz]);
    }
    // Proyección perspectiva
    const proj = pts3.map(([x,y,z])=>{
      const d=500/(500+z*28);
      return [cx+x*d*scale, cy-y*d*scale, d];
    });
    // Ordenar por z (painter's algo)
    const segs=[];
    for(let i=0;i<N;i++) segs.push([(pts3[i][2]+pts3[i+1][2])/2, i]);
    segs.sort((a,b)=>a[0]-b[0]);

    // Dibujar segmentos
    ctx.lineCap='round';
    for(const [mz,i] of segs){
      const d=Math.max(0,Math.min(1,(mz+3.5)/7));
      let r,g,b;
      if(colorScheme==='gold'){
        r=Math.round(colorScheme==='gold'?(175+80*Math.sin(fn*.038)):0);
        g=Math.round(d*180);
        b=Math.round((35+70*Math.sin(fn*.031))*(0.18+.82*d));
        r=Math.round((175+80*Math.sin(fn*.038))*(0.22+.78*d));
        g=Math.round(d*d*160);
        b=Math.round((35+70*Math.sin(fn*.031))*(0.18+.82*d));
      } else {
        // Cian/azul
        r=Math.round(d*30);
        g=Math.round((140+80*Math.sin(fn*.038))*(0.22+.78*d));
        b=Math.round((200+55*Math.sin(fn*.031))*(0.3+.7*d));
      }
      ctx.strokeStyle=`rgb(${r},${g},${b})`;
      ctx.lineWidth=Math.max(1,(1+3.5*d)*Math.min(W,H)/700);
      ctx.beginPath();
      ctx.moveTo(proj[i][0],proj[i][1]);
      ctx.lineTo(proj[i+1][0],proj[i+1][1]);
      ctx.stroke();
    }

    fn++;
    if(onFrame) onFrame(fps, dt);
    requestAnimationFrame(drawHeart);
  }
  requestAnimationFrame(drawHeart);
  return ()=>fps;
}

// ─── P1 — Dorado ─────────────────────────────────────────────
const c1 = document.getElementById('c1');
makeHeartRenderer(c1,'gold',(fps,dt)=>{
  document.getElementById('hud1').textContent=`${fps} fps · ${dt.toFixed(1)}ms · P1 canvas nativo`;
});

// ─── P2 — Cian con Activity Log ──────────────────────────────
const c2 = document.getElementById('c2');
let p2Frame = 0;
makeHeartRenderer(c2,'cyan',(fps,dt)=>{
  document.getElementById('hud2').textContent=`${fps} fps · ${dt.toFixed(1)}ms · P2 en vivo`;
  // Log periódico de actividad simulando lo que Zapia hace
  p2Frame++;
  if(p2Frame % 180 === 1)  addLog('⚙️  Cloudflare Worker lab desplegado — zapia-visor-lab', 'ok');
  if(p2Frame % 180 === 30) addLog('🔑  KV namespace creado: ca719bf4...', 'ok');
  if(p2Frame % 180 === 60) addLog('📦  Benchmark iniciado — 3 configs × 15s', '');
  if(p2Frame % 180 === 90) addLog('⚠️  KV write limit 429 — plan free agotado', 'warn');
  if(p2Frame % 180 === 120) addLog('🔄  Worker prod re-deployado + KV limpiado', '');
  if(p2Frame % 180 === 150) addLog('⏳  Reset KV writes: medianoche UTC — esperando...', 'warn');
  if(p2Frame % 360 === 200) addLog('🎨  Renderizando corazón 3D — 60fps canvas nativo', 'ok');
  if(p2Frame % 360 === 260) addLog('🧪  Lab worker listo en workers.dev ✅', 'ok');
  if(p2Frame % 360 === 310) addLog('📊  Comparativa: 900p q88 vs 480p q35 vs 320p q25', '');
});

// ─── VS canvases ─────────────────────────────────────────────
const c3 = document.getElementById('c3');
const c4 = document.getElementById('c4');
makeHeartRenderer(c3,'gold', null);
makeHeartRenderer(c4,'cyan', null);

// Resize VS canvases al contenedor
function resizeVS(){
  const lw = document.getElementById('vs-left').offsetWidth;
  const lh = document.getElementById('vs-left').offsetHeight;
  [c3,c4].forEach(c=>{c.style.width=lw+'px';c.style.height=lh+'px';});
}
window.addEventListener('resize',resizeVS); resizeVS();
</script>
</body>
</html>
