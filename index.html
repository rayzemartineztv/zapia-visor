<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Zapia Control — Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020205;color:#fff;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}

/* Header & Tabs */
#header{background:#050510;border-bottom:1px solid #1a1a3a;z-index:100;flex-shrink:0;transition:transform 0.3s}
#tabs{display:flex}
.tab{flex:1;padding:12px 0;text-align:center;cursor:pointer;font-size:12px;font-weight:600;color:#445;transition:all .2s;border-bottom:3px solid transparent}
.tab.active{color:#fff;border-bottom-color:#f0a800}

/* Toolbar */
#toolbar{background:#080816;padding:8px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #151525}
.btn{background:rgba(240,168,0,0.1);border:1px solid #f0a80044;
  color:#f0a800;padding:5px 12px;border-radius:4px;font-size:10px;font-weight:bold;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:all 0.2s}
.btn:hover{background:#f0a800;color:#000;border-color:#f0a800}

/* Contenedor Principal */
#screens{flex:1;position:relative;overflow:hidden;background:#000}
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:stretch;background:#020205}
.screen.active{display:flex}

/* P1 - Panel de Órdenes */
#screen-p1{background:#010105;padding:10px;overflow-y:auto;font-family:'Consolas','Monaco',monospace;cursor:zoom-in}
.order-card{background:rgba(15,15,30,0.8);border-left:3px solid #f0a800;padding:8px 10px;margin-bottom:6px;border-radius:3px;pointer-events:none}
.order-ts{color:#445;font-size:9px}
.order-title{color:#f0a800;font-weight:bold;font-size:10.5px}
.order-msg{color:#aaccff;font-size:10px}

/* P2 - Zapia Screen */
#p2-topbar{background:#0a0a1a;border-bottom:1px solid #1a1a3a;padding:6px 12px;display:flex;align-items:center;gap:10px}
#p2-url{flex:1;background:#08080f;border:1px solid #1a1a2a;border-radius:5px;padding:3px 10px;font-size:10.5px;color:#667;font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#p2-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000;position:relative;cursor:zoom-in}
#p2-img{max-width:100%;max-height:100%;object-fit:contain;transition:all 0.3s ease}

/* Theater Mode Updates */
body.theater-mode #header { transform: translateY(-100%); position: absolute; width: 100%; }
body.theater-mode #screens { height: 100vh; }
body.theater-mode #p2-topbar { display: none; }
body.theater-mode #screen-p1, body.theater-mode #p2-img-wrap, body.theater-mode .half { cursor: zoom-out; }
body.theater-mode #p2-img { max-width: 100vw; max-height: 100vh; width: 100vw; height: 100vh; object-fit: contain; }

/* VS Split */
#screen-vs{flex-direction:row!important}
.half{flex:1;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden;cursor:zoom-in}
.divider{width:1px;background:#1a1a3a;flex-shrink:0}
</style>
</head>
<body id="main-body">

<div id="header">
  <div id="tabs">
    <div class="tab active" onclick="show('p1')">P1 — ÓRDENES</div>
    <div class="tab"        onclick="show('p2')">P2 — SCREEN</div>
    <div class="tab"        onclick="show('vs')">VS</div>
  </div>
  <div id="toolbar">
    <button class="btn" onclick="manualRefresh()">F5 ACTUALIZAR</button>
    <button class="btn" id="fs-btn" onclick="toggleTheater()">EXPANDIR PANTALLA</button>
  </div>
</div>

<div id="screens">
  <!-- Agregué onclick directo al screen de P1 -->
  <div id="screen-p1" class="screen active" onclick="handleContainerClick(event)">
    <div id="orders-container"></div>
  </div>

  <div id="screen-p2" class="screen">
    <div id="p2-topbar">
      <div style="font-size:9px;color:#00ff88;font-weight:700">LIVE</div>
      <div id="p2-url">conectando…</div>
    </div>
    <div id="p2-img-wrap" onclick="handleContainerClick(event)">
      <img id="p2-img" src="" style="opacity:0"/>
    </div>
    <div style="background:#050510;padding:4px 12px;font-size:9px;color:#334;display:flex;justify-content:space-between">
      <span id="p2-status">🟢 ONLINE</span>
      <span id="p2-time"></span>
    </div>
  </div>

  <div id="screen-vs" class="screen">
    <!-- Klik en cualquier mitad para cerrar modo cine -->
    <div class="half" id="vs-orders" style="padding:8px;overflow-y:auto;background:#010105" onclick="handleContainerClick(event)"></div>
    <div class="divider"></div>
    <div class="half" style="background:#000" onclick="handleContainerClick(event)">
      <img id="p2-img-vs" src="" style="max-width:100%;max-height:100%;object-fit:contain"/>
    </div>
  </div>
</div>

<script>
let currentTab = 'p1';
let isTheater = false;

function show(id){
  currentTab = id;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  const idx = {p1:0,p2:1,vs:2}[id];
  document.querySelectorAll('.tab')[idx].classList.add('active');
}

function toggleTheater(){
  isTheater = !isTheater;
  document.getElementById('main-body').classList.toggle('theater-mode', isTheater);
  document.getElementById('fs-btn').textContent = isTheater ? 'REDUCIR PANTALLA' : 'EXPANDIR PANTALLA';
}

// Función unificada para manejar clicks en contenedores
function handleContainerClick(e){
  if(isTheater){
    toggleTheater();
  } else {
    // Si no está expandido, solo expandir si es una zona permitida
    toggleTheater();
  }
}

function manualRefresh(){
  if(currentTab === 'p1' || currentTab === 'vs') fetchLogs(true);
  if(currentTab === 'p2' || currentTab === 'vs') poll(true);
}

const ordersCont = document.getElementById('orders-container');
const vsOrdersCont = document.getElementById('vs-orders');
let lastLogCount = 0;

function addOrder(entry){
  const card = document.createElement('div');
  card.className = 'order-card';
  card.innerHTML = `<div class="order-ts">${entry.ts}</div><div class="order-title">${(entry.msg.split('→')[0]).trim()}</div><div class="order-msg">${(entry.msg.split('→')[1] || entry.msg).trim()}</div>`;
  ordersCont.prepend(card);
  const vsCard = card.cloneNode(true);
  vsOrdersCont.prepend(vsCard);
}

async function fetchLogs(isManual){
  try{
    const r = await fetch('https://raw.githubusercontent.com/rayzemartineztv/zapia-visor/main/logs.json?v='+Date.now());
    const logs = await r.json();
    if(isManual){
      ordersCont.innerHTML = ''; vsOrdersCont.innerHTML = '';
      logs.slice(-30).forEach(addOrder);
      lastLogCount = logs.length;
    } else if(logs.length > lastLogCount){
      logs.slice(lastLogCount).forEach(addOrder);
      lastLogCount = logs.length;
    }
  }catch(e){}
}

const p2img=document.getElementById('p2-img'),p2imgvs=document.getElementById('p2-img-vs'),p2time=document.getElementById('p2-time'),p2url=document.getElementById('p2-url');
let lastPtr='';
async function poll(isManual){
  try{
    const r=await fetch('https://raw.githubusercontent.com/rayzemartineztv/zapia-visor/main/pointer.txt?v='+Date.now());
    const ptr=(await r.text()).trim();
    if(isManual || (ptr && ptr!==lastPtr)){
      lastPtr=ptr;
      const tmp=new Image();
      tmp.onload=()=>{
        p2img.src=p2imgvs.src=tmp.src; p2img.style.opacity=1;
        p2time.textContent=new Date().toLocaleTimeString('es-CL');
      };
      tmp.src='https://raw.githubusercontent.com/rayzemartineztv/zapia-visor/main/'+ptr+'?v='+Date.now();
    }
    const mr=await fetch('https://raw.githubusercontent.com/rayzemartineztv/zapia-visor/main/screen_meta.json?v='+Date.now());
    if(mr.ok){const m=await mr.json(); p2url.textContent=m.url;}
  }catch(e){}
}

setInterval(fetchLogs, 3000); fetchLogs();
setInterval(poll, 4000); poll();
</script>
</body>
</html>
