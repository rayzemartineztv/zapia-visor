<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Zapia Control — Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020205;color:#fff;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh}
#tabs{display:flex;background:#050510;border-bottom:1px solid #1a1a3a;z-index:10;position:relative}
.tab{flex:1;padding:12px 0;text-align:center;cursor:pointer;font-size:12px;font-weight:600;color:#445;transition:all .2s;border-bottom:3px solid transparent}
.tab.active{color:#fff;border-bottom-color:#f0a800}

/* Botón F5 Universal */
.f5-btn{position:absolute;top:55px;right:15px;z-index:100;background:rgba(20,20,35,0.8);border:1px solid #334;
  color:#f0a800;padding:6px 12px;border-radius:4px;font-size:10px;font-weight:bold;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:all 0.2s;backdrop-filter:blur(4px)}
.f5-btn:hover{background:#f0a800;color:#000;border-color:#f0a800}
.f5-btn:active{transform:scale(0.95)}

#screens{width:100%;height:calc(100vh - 43px);position:relative}
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:stretch;background:#020205}
.screen.active{display:flex}

/* P1 - Panel de Órdenes Compacto */
#screen-p1{background:#010105;padding:50px 10px 10px 10px;overflow-y:auto;font-family:'Consolas','Monaco',monospace}
.order-card{background:rgba(15,15,30,0.8);border-left:3px solid #f0a800;padding:8px 10px;margin-bottom:6px;border-radius:3px;animation:fadeIn 0.2s ease}
.order-ts{color:#445;font-size:9px;margin-bottom:2px}
.order-title{color:#f0a800;font-weight:bold;font-size:10.5px;margin-bottom:2px}
.order-msg{color:#aaccff;font-size:10px;line-height:1.3}
.order-ok{border-left-color:#00ff88}

/* P2 - Zapia Screen */
#p2-topbar{background:#050510;border-bottom:1px solid #1a1a3a;padding:6px 12px;display:flex;align-items:center;gap:10px}
#p2-url{flex:1;background:#08080f;border:1px solid #1a1a2a;border-radius:5px;padding:3px 10px;font-size:10.5px;color:#667;font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#p2-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000;position:relative}
#p2-img{max-width:100%;max-height:100%;object-fit:contain;transition:opacity .2s}

/* VS Split */
#screen-vs{flex-direction:row!important}
.half{flex:1;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}
.divider{width:1px;background:#1a1a3a;flex-shrink:0}

@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.dot{width:7px;height:7px;border-radius:50%;background:#00ff88;animation:pulse 1.2s ease infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="tabs">
  <div class="tab active" onclick="show('p1')">P1 — ÓRDENES</div>
  <div class="tab"        onclick="show('p2')">P2 — SCREEN</div>
  <div class="tab"        onclick="show('vs')">VS</div>
</div>

<button class="f5-btn" onclick="manualRefresh()">
  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
  F5 ACTUALIZAR
</button>

<div id="screens">
  <!-- P1 -->
  <div id="screen-p1" class="screen active">
    <div style="font-size:9px;color:#334;margin-bottom:10px;letter-spacing:1px;text-align:center">ZAPIA COMMAND LOG — REALTIME 🔴</div>
    <div id="orders-container"></div>
  </div>

  <!-- P2 -->
  <div id="screen-p2" class="screen">
    <div id="p2-topbar">
      <div style="display:flex;align-items:center;gap:5px;font-size:9px;font-weight:700;color:#00ff88"><div class="dot"></div>LIVE</div>
      <div id="p2-url">conectando…</div>
    </div>
    <div id="p2-img-wrap">
      <img id="p2-img" src="" style="opacity:0" alt=""/>
    </div>
    <div style="background:#050510;padding:4px 12px;font-size:9px;color:#334;display:flex;justify-content:space-between;border-top:1px solid #1a1a3a">
      <span id="p2-status">🟢 ONLINE</span>
      <span id="p2-time"></span>
    </div>
  </div>

  <!-- VS -->
  <div id="screen-vs" class="screen">
    <div class="half" id="vs-orders" style="padding:50px 8px 8px 8px;overflow-y:auto;background:#010105"></div>
    <div class="divider"></div>
    <div class="half" style="background:#000">
      <img id="p2-img-vs" src="" style="max-width:100%;max-height:100%;object-fit:contain" alt=""/>
      <div style="position:absolute;top:6px;left:6px;font-size:8px;color:#00ff88;font-weight:bold;background:rgba(0,0,0,0.6);padding:2px 5px;border-radius:3px">SCREEN</div>
    </div>
  </div>
</div>

<script>
let currentTab = 'p1';
function show(id){
  currentTab = id;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  const idx = {p1:0,p2:1,vs:2}[id];
  document.querySelectorAll('.tab')[idx].classList.add('active');
}

function manualRefresh(){
  if(currentTab === 'p1' || currentTab === 'vs') fetchLogs(true);
  if(currentTab === 'p2' || currentTab === 'vs') poll(true);
}

const ordersCont = document.getElementById('orders-container');
const vsOrdersCont = document.getElementById('vs-orders');
let lastLogCount = 0;

function addOrder(entry, isManual){
  const card = document.createElement('div');
  card.className = 'order-card' + (entry.tipo==='ok' ? ' order-ok' : '');
  const title = entry.msg.includes('→') ? entry.msg.split('→')[0] : 'COMANDO';
  const detail = entry.msg.includes('→') ? entry.msg.split('→')[1] : entry.msg;
  
  card.innerHTML = `
    <div class="order-ts">${entry.ts}</div>
    <div class="order-title">${title.trim()}</div>
    <div class="order-msg">${detail.trim()}</div>
  `;
  
  ordersCont.prepend(card);
  const vsCard = card.cloneNode(true);
  vsOrdersCont.prepend(vsCard);
  
  if(ordersCont.children.length > 50) ordersCont.removeChild(ordersCont.lastChild);
  if(vsOrdersCont.children.length > 50) vsOrdersCont.removeChild(vsOrdersCont.lastChild);
}

async function fetchLogs(isManual){
  try{
    const r = await fetch('https://raw.githubusercontent.com/rayzemartineztv/zapia-visor/main/logs.json?v='+Date.now());
    if(!r.ok) return;
    const logs = await r.json();
    if(isManual){
      ordersCont.innerHTML = ''; vsOrdersCont.innerHTML = '';
      logs.slice(-30).forEach(l => addOrder(l));
      lastLogCount = logs.length;
    } else if(logs.length > lastLogCount){
      const nuevos = logs.slice(lastLogCount);
      nuevos.forEach(addOrder);
      lastLogCount = logs.length;
    }
  }catch(e){}
}

const p2img=document.getElementById('p2-img'),p2imgvs=document.getElementById('p2-img-vs'),p2time=document.getElementById('p2-time'),p2url=document.getElementById('p2-url');
let lastPtr='';
async function poll(isManual){
  try{
    const r=await fetch('https://raw.githubusercontent.com/rayzemartineztv/zapia-visor/main/pointer.txt?v='+Date.now());
    if(!r.ok) return;
    const ptr=(await r.text()).trim();
    if(isManual || (ptr && ptr!==lastPtr)){
      lastPtr=ptr;
      const tmp=new Image();
      tmp.onload=()=>{
        p2img.src=p2imgvs.src=tmp.src; p2img.style.opacity=1;
        p2time.textContent=new Date().toLocaleTimeString('es-CL');
      };
      tmp.src='https://raw.githubusercontent.com/rayzemartineztv/zapia-visor/main/'+ptr+'?v='+Date.now();
    }
    const mr=await fetch('https://raw.githubusercontent.com/rayzemartineztv/zapia-visor/main/screen_meta.json?v='+Date.now());
    if(mr.ok){const m=await mr.json(); p2url.textContent=m.url;}
  }catch(e){}
}

setInterval(fetchLogs, 3000); fetchLogs();
setInterval(poll, 4000); poll();
</script>
</body>
</html>
