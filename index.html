<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Zapia Visor — HQ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#04040a;color:#fff;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh}
#tabs{display:flex;background:#080816;border-bottom:1px solid #1a1a3a;z-index:10;position:relative}
.tab{flex:1;padding:12px 0;text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:#556;transition:all .2s;border-bottom:3px solid transparent}
.tab.active{color:#fff;border-bottom-color:#f0a800}
#screens{width:100%;height:calc(100vh - 43px);position:relative}
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:stretch;background:#04040a}
.screen.active{display:flex}

/* Estilo Canvas P1 */
.canvas-wrap{position:relative;width:100%;height:100%}
canvas{display:block;width:100%;height:100%}
.hud{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.6);padding:5px 16px;border-radius:20px;
  font-size:11px;color:#aaa;white-space:nowrap;pointer-events:none}
.badge{position:absolute;top:10px;left:12px;font-size:10px;font-weight:700;
  padding:3px 10px;border-radius:12px;pointer-events:none;z-index:5}
.badge-p1{background:rgba(255,168,0,.15);color:#f0a800;border:1px solid #f0a80044}
.badge-p2{background:rgba(0,255,120,.15);color:#00ff88;border:1px solid #00ff8844}

/* P2 - Zapia Screen */
#p2-topbar{background:#0a0a1a;border-bottom:1px solid #1a1a3a;padding:8px 15px;display:flex;align-items:center;gap:12px}
#p2-url{flex:1;background:#111;border:1px solid #222;border-radius:6px;padding:4px 10px;font-size:11px;color:#889;font-family:monospace;white-space:nowrap;overflow:hidden}
#p2-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000;position:relative}
#p2-img{max-width:100%;max-height:100%;object-fit:contain;transition:opacity .3s}

/* VS Split */
#screen-vs{flex-direction:row!important}
.half{flex:1;height:100%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.divider{width:2px;background:linear-gradient(to bottom,transparent,#334,transparent);flex-shrink:0}

@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.dot{width:8px;height:8px;border-radius:50%;background:#00ff88;animation:pulse 1.2s ease infinite}
</style>
</head>
<body>

<div id="tabs">
  <div class="tab active" onclick="show('p1')">P1 — Dorado (Local)</div>
  <div class="tab"        onclick="show('p2')">P2 — Zapia Screen (Vivo)</div>
  <div class="tab"        onclick="show('vs')">AMBAS (VS)</div>
</div>

<div id="screens">
  <!-- P1 -->
  <div id="screen-p1" class="screen active">
    <div class="canvas-wrap">
      <canvas id="c1"></canvas>
      <div class="badge badge-p1">P1 · CANVAS DORADO · 60FPS</div>
      <div class="hud" id="hud1">60 fps · 16.7ms</div>
    </div>
  </div>

  <!-- P2 -->
  <div id="screen-p2" class="screen">
    <div id="p2-topbar">
      <div style="display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;color:#00ff88"><div class="dot"></div>LIVE</div>
      <div id="p2-url">https://www.youtube.com/results?search_query=calle+latina</div>
    </div>
    <div id="p2-img-wrap">
      <img id="p2-img" src="" style="opacity:0"/>
    </div>
    <div style="background:#0a0a1a;padding:5px 15px;font-size:10px;color:#445;display:flex;justify-content:space-between">
      <span id="p2-status">🟢 Conectado</span>
      <span id="p2-time"></span>
    </div>
  </div>

  <!-- VS -->
  <div id="screen-vs" class="screen">
    <div class="half">
      <canvas id="c3" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
      <div class="badge badge-p1" style="top:8px;left:8px;font-size:9px">P1 · LOCAL</div>
    </div>
    <div class="divider"></div>
    <div class="half" style="background:#000">
      <img id="p2-img-vs" src="" style="max-width:100%;max-height:100%;object-fit:contain"/>
      <div class="badge badge-p2" style="top:8px;left:8px;font-size:9px">P2 · SCREEN</div>
    </div>
  </div>
</div>

<script>
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  const idx = {p1:0,p2:1,vs:2}[id];
  document.querySelectorAll('.tab')[idx].classList.add('active');
}

function makeHeart(canvas){
  const ctx=canvas.getContext('2d');
  let fn=0;
  function resize(){canvas.width=canvas.offsetWidth*devicePixelRatio;canvas.height=canvas.offsetHeight*devicePixelRatio;}
  resize(); window.addEventListener('resize',resize);
  function draw(){
    const W=canvas.width,H=canvas.height;
    ctx.fillStyle='rgba(4,4,10,0.4)'; ctx.fillRect(0,0,W,H);
    const beat=1+.08*Math.sin(fn*.18),ang=(fn*.018)%(2*Math.PI),cx=W/2,cy=H/2+H*.03,sc=Math.min(W,H)*.105;
    const pts=[],N=200;
    for(let i=0;i<=N;i++){
      const t=2*Math.PI*i/N;
      const x=16*Math.pow(Math.sin(t),3)*.3*beat,y=(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))*.3*beat,z=8*Math.sin(t)*Math.cos(t)*.3*beat;
      const rx=x*Math.cos(ang)+z*Math.sin(ang),rz=-x*Math.sin(ang)+z*Math.cos(ang);
      const d=500/(500+rz*28); pts.push([cx+rx*d*sc,cy-y*d*sc,rz]);
    }
    for(let i=0;i<N;i++){
      const d=Math.max(0.2,Math.min(1,(pts[i][2]+3.5)/7));
      ctx.strokeStyle=`rgb(${Math.round(255*d)},${Math.round(215*d)},${Math.round(50*d)})`;
      ctx.lineWidth=Math.max(1,2.5*d*W/800);
      ctx.beginPath();ctx.moveTo(pts[i][0],pts[i][1]);ctx.lineTo(pts[i+1][0],pts[i+1][1]);ctx.stroke();
    }
    fn++; requestAnimationFrame(draw);
  }
  draw();
}

makeHeart(document.getElementById('c1'));
makeHeart(document.getElementById('c3'));

// Polling P2
const p2img=document.getElementById('p2-img'),p2imgvs=document.getElementById('p2-img-vs'),p2time=document.getElementById('p2-time');
let lastPtr='';
async function poll(){
  try{
    const r=await fetch('https://raw.githubusercontent.com/rayzemartineztv/zapia-visor/main/pointer.txt?v='+Date.now());
    if(!r.ok) return;
    const ptr=(await r.text()).trim();
    if(ptr && ptr!==lastPtr){
      lastPtr=ptr;
      const tmp=new Image();
      tmp.onload=()=>{
        p2img.src=p2imgvs.src=tmp.src; p2img.style.opacity=1;
        p2time.textContent=new Date().toLocaleTimeString('es-CL');
      };
      tmp.src='https://raw.githubusercontent.com/rayzemartineztv/zapia-visor/main/'+ptr;
    }
  }catch(e){}
}
setInterval(poll, 2500); poll();
</script>
</body>
</html>
