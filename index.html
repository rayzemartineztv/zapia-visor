<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Zapia Master V3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body, html { height: 100%; width: 100%; overflow: hidden; position: fixed; background: #000; color: #fff; font-family: sans-serif; }
#header { background: #111; padding: 12px; border-bottom: 2px solid #f0a800; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
#status-container { display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: bold; }
#status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
#chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; height: calc(100vh - 120px); }
.msg { padding: 10px; border-radius: 10px; font-size: 14px; max-width: 85%; line-height: 1.4; animation: slideIn 0.2s ease; }
.zap { align-self: flex-start; background: #1a1a2e; border-left: 4px solid #f0a800; color: #cce; }
.user { align-self: flex-end; background: #16213e; color: #fff; }
#footer { position: fixed; bottom: 0; width: 100%; background: #111; padding: 10px; border-top: 1px solid #333; display: flex; gap: 8px; align-items: center; }
#input { flex: 1; background: #222; border: 1px solid #444; color: #fff; padding: 12px 15px; border-radius: 25px; outline: none; font-size: 16px; }
#send-btn { background: #f0a800; border: none; color: #000; width: 45px; height: 45px; border-radius: 50%; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 20px; }
@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
    <div id="header">
        <div style="color:#f0a800; font-weight:bold; letter-spacing:1px;">ZAPIA MASTER V3</div>
        <div id="status-container">
            <div id="status-dot"></div>
            <span id="status-text">CONECTANDO...</span>
        </div>
    </div>
    <div id="chat-container"></div>
    <div id="footer">
        <input type="text" id="input" placeholder="Escribe al espejo...">
        <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>

    <script>
        const REPO = 'rayzemartineztv/zapia-visor';
        const TOKEN = '';
        let lastTimestamp = "";

        async function fetchMessages() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            try {
                const response = await fetch(`https://raw.githubusercontent.com/${REPO}/main/chat.json?v=${Date.now()}`);
                if (!response.ok) throw new Error();
                const messages = await response.json();
                
                if (messages.length > 0 && messages[messages.length - 1].ts !== lastTimestamp) {
                    const container = document.getElementById('chat-container');
                    container.innerHTML = '';
                    messages.forEach(m => {
                        const div = document.createElement('div');
                        div.className = `msg ${m.tipo === 'user' ? 'user' : 'zap'}`;
                        div.innerHTML = `<small style="display:block;font-size:9px;opacity:0.6;margin-bottom:2px;">${m.ts}</small>${m.msg}`;
                        container.appendChild(div);
                    });
                    container.scrollTop = container.scrollHeight;
                    lastTimestamp = messages[messages.length - 1].ts;
                }
                dot.style.background = "#00ff88";
                dot.style.boxShadow = "0 0 8px #00ff88";
                text.innerText = "ONLINE";
            } catch (e) {
                dot.style.background = "#ff3333";
                dot.style.boxShadow = "0 0 8px #ff3333";
                text.innerText = "ERROR SYNC";
            }
        }

        async function sendMessage() {
            const input = document.getElementById('input');
            const msg = input.value.trim();
            if (!msg) return;

            const ts = new Date().toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const newItem = { ts, msg, tipo: 'user' };
            input.value = '';

            try {
                const apiUrl = `https://api.github.com/repos/${REPO}/contents/chat.json`;
                const res = await fetch(apiUrl, { headers: { 'Authorization': `token ${TOKEN}` } });
                const data = await res.json();
                let logs = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                logs.push(newItem);
                if (logs.length > 30) logs = logs.slice(-30);

                await fetch(apiUrl, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Msg: ${msg.substring(0,10)}`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(logs)))),
                        sha: data.sha
                    })
                });
                fetchMessages();
            } catch (err) {
                alert("Error al enviar. Reintentando...");
            }
        }

        setInterval(fetchMessages, 2000);
        fetchMessages();
    </script>
</body>
</html>
