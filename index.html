<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Zapia Master CloudSync</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body, html { height: 100%; width: 100%; overflow: hidden; position: fixed; }
body{background:#000;color:#fff;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column}
#header{background:#050510;border-bottom:1px solid #1a1a3a;flex-shrink:0;z-index:1000;width:100%}
#tabs{display:flex}
.tab{flex:1;padding:14px 0;text-align:center;cursor:pointer;font-size:11px;font-weight:700;color:#445;border-bottom:2px solid transparent;text-transform:uppercase;position:relative;overflow:hidden}
.tab.active{color:#fff;border-bottom-color:#f0a800;background:rgba(240,168,0,0.05)}
#toolbar{background:#080816;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid #151525}
.btn{background:rgba(240,168,0,0.1);border:1px solid #f0a80044;color:#f0a800;padding:6px 12px;border-radius:4px;font-size:10px;font-weight:bold;cursor:pointer;position:relative;overflow:hidden}
.ripple{position:absolute;background:rgba(255,255,255,0.3);border-radius:50%;transform:scale(0);animation:ripple-animation 0.4s linear;pointer-events:none}
@keyframes ripple-animation{to{transform:scale(4);opacity:0}}
#screens{flex:1;position:relative;background:#000;width:100%;overflow:hidden}
.screen{position:absolute;inset:0;display:none;flex-direction:column;background:#020205}
.screen.active{display:flex}
.chat-container{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:12px;background:#010105;padding-bottom:120px}
.msg{max-width:85%;padding:10px;border-radius:10px;font-size:13px;line-height:1.4;word-wrap:break-word;position:relative;animation:fadeIn 0.2s ease-out}
.msg.user{align-self:flex-end;background:#1a1a3a;color:#fff;border-bottom-right-radius:0}
.msg.zap{align-self:flex-start;background:#101025;color:#cceeff;border-bottom-left-radius:0;border-left:3px solid #f0a800}
#p3-footer{background:#080816;border-top:1px solid #1a1a3a;flex-shrink:0;width:100%;z-index:1000}
#input-bar{padding:10px 12px;display:flex;align-items:center;gap:8px;background:#080816}
#cmd-input{flex:1;background:#101020;border:1px solid #223;border-radius:20px;padding:10px 15px;color:#fff;font-size:15px;outline:none;min-width:0}
.circle-btn{width:42px;height:42px;border-radius:50%;background:#1a1a3a;border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;position:relative;overflow:hidden}
.mic-btn{background:#f0a800;color:#000}
.mic-btn.recording{background:#ff0000;animation:pulse 1s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,0,0,0.7)}70%{box-shadow:0 0 0 10px rgba(255,0,0,0)}100%{box-shadow:0 0 0 0 rgba(255,0,0,0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body id="main-body">
<div id="header">
  <div id="tabs">
    <div class="tab" onclick="show('p1', event)">ÓRDENES</div>
    <div class="tab" onclick="show('p2', event)">VISOR</div>
    <div class="tab active" onclick="show('p3', event)">MASTER CLOUD</div>
  </div>
  <div id="toolbar">
    <div id="status-dot" style="width:8px;height:8px;background:#555;border-radius:50%"></div>
    <div style="font-size:10px;color:#f0a800;font-weight:bold;letter-spacing:1px">CLOUD SYNC</div>
    <button class="btn" onclick="location.reload()">REBOOT</button>
  </div>
</div>
<div id="screens">
  <div id="screen-p1" class="screen"><div class="chat-container" id="orders-container"></div></div>
  <div id="screen-p2" class="screen"><div style="flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000"><img id="p2-img" style="max-width:100%;max-height:100%;object-fit:contain"/></div></div>
  <div id="screen-p3" class="screen active">
    <div class="chat-container" id="chat-hist"></div>
    <div id="p3-footer">
      <div id="input-bar">
        <button class="circle-btn" onclick="document.getElementById('hidden-file').click()">+</button>
        <input type="file" id="hidden-file" multiple style="display:none" onchange="handleFiles(this.files)">
        <input type="text" id="cmd-input" placeholder="Cloud Command..." onkeypress="if(event.key==='Enter') sendCmd(event)">
        <button id="mic-btn" class="circle-btn mic-btn" onclick="toggleMic(event)">🎤</button>
        <button class="circle-btn" onclick="sendCmd(event)">➤</button>
      </div>
    </div>
  </div>
</div>
<script>
let currentTab='p3',lastLogCount=0,fullHistory=[],isTheater=false,mediaRecorder,audioChunks=[],isRecording=false;
const KV_KEY='6b059378ffda4491835a8a4d2042c4d1';
const WORKER_URL='https://zapia-visor-p2.rayzecontacto.workers.dev';

function createRipple(e){
  const b=e.currentTarget,c=document.createElement("span"),d=Math.max(b.clientWidth,b.clientHeight),r=d/2;
  c.style.width=c.style.height=`${d}px`;
  c.style.left=`${e.clientX-b.getBoundingClientRect().left-r}px`;
  c.style.top=`${e.clientY-b.getBoundingClientRect().top-r}px`;
  c.classList.add("ripple");
  const prev=b.getElementsByClassName("ripple")[0]; if(prev) prev.remove();
  b.appendChild(c);
}
function show(id,e){ if(e)createRipple(e); currentTab=id; document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.getElementById('screen-'+id).classList.add('active'); document.querySelector(`[onclick^="show('${id}'"]`).classList.add('active'); }

async function toggleMic(e){
  if(e)createRipple(e); const b=document.getElementById('mic-btn');
  if(!isRecording){
    try{
      const s=await navigator.mediaDevices.getUserMedia({audio:true});
      mediaRecorder=new MediaRecorder(s); audioChunks=[];
      mediaRecorder.ondataavailable=ev=>audioChunks.push(ev.data);
      mediaRecorder.onstop=()=>{ processSend("🎤 AUDIO CLOUD",false); s.getTracks().forEach(t=>t.stop()); };
      mediaRecorder.start(); isRecording=true; b.classList.add('recording'); b.innerHTML='⏹';
    }catch(err){alert("Micro off");}
  }else{mediaRecorder.stop(); isRecording=false; b.classList.remove('recording'); b.innerHTML='🎤';}
}

function handleFiles(f){ Array.from(f).forEach(file=>processSend("📦 CLOUD FILE: "+file.name,false)); }
function sendCmd(e){ if(e)createRipple(e); const v=document.getElementById('cmd-input').value; if(!v) return; processSend(v, false); }

async function pushCloud(item){
  try{
    document.getElementById('status-dot').style.background='#f0a800';
    await fetch(WORKER_URL + '/push-chat', {
      method:'POST',
      headers:{'X-Zapia-Key':'zapia2024live','Content-Type':'application/json'},
      body:JSON.stringify(item)
    });
    document.getElementById('status-dot').style.background='#00ff88';
  }catch(err){
    document.getElementById('status-dot').style.background='#ff0000';
  }
}

function processSend(t,wf){
  const ts=new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const h={ts,msg:t,tipo:'user'};
  fullHistory.push(h); renderChat(); document.getElementById('cmd-input').value='';
  pushCloud(h);
}

function renderChat(){
  const h=document.getElementById('chat-hist'); h.innerHTML='';
  fullHistory.sort((a,b)=>a.ts.localeCompare(b.ts)); 
  fullHistory.forEach(m=>{
    const d=document.createElement('div'); d.className='msg '+(m.tipo==='user'?'user':'zap');
    d.innerHTML=`<small style="opacity:0.5;font-size:9px">${m.ts}</small><br>${m.msg}`;
    h.appendChild(d);
  });
  h.scrollTop=h.scrollHeight;
}

async function fetchCloud(){
  try{
    const r=await fetch(WORKER_URL + '/get-chat?v='+Date.now());
    const l=await r.json();
    if(l.length > 0){
      let changed = false;
      l.forEach(log=>{ 
        if(!fullHistory.find(h=>h.ts===log.ts && h.msg===log.msg)) {
           fullHistory.push({ts:log.ts,msg:log.msg,tipo:log.tipo});
           changed = true;
        }
      });
      if(changed){
        renderChat();
        const o=document.getElementById('orders-container'); o.innerHTML='';
        l.slice().reverse().forEach(e=>{ 
          const c=document.createElement('div'); c.className='msg zap'; 
          c.innerHTML=`<small style="color:#f0a800">${e.ts}</small><br><b>${e.msg}</b>`; 
          o.appendChild(c); 
        });
      }
      document.getElementById('status-dot').style.background='#00ff88';
    }
  }catch(err){ document.getElementById('status-dot').style.background='#ff0000'; }
}

const p2=document.getElementById('p2-img');
async function pollScreen(){ try{ const r=await fetch(WORKER_URL + '/frame2'); if(r.ok) p2.src=WORKER_URL + '/frame2?v='+Date.now(); }catch(e){}}
setInterval(fetchCloud, 1000); 
setInterval(pollScreen, 2000);
</script>
</body>
</html>
