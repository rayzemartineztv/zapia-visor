<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Zapia Visor — Live</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
  }
  h1 {
    font-size: 15px;
    color: #aaa;
    margin-bottom: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  #status-bar {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: #666;
    margin-bottom: 10px;
    align-items: center;
  }
  #dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #2ecc71;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  #dot.offline { background: #e74c3c; animation: none; }
  #frame-container {
    width: 100%;
    max-width: 960px;
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    overflow: hidden;
  }
  #frame {
    width: 100%;
    height: auto;
    display: block;
  }
  #info {
    font-size: 11px;
    color: #444;
    margin-top: 6px;
    text-align: center;
  }
</style>
</head>
<body>
<h1>⚡ Zapia Visor — En vivo</h1>
<div id="status-bar">
  <div id="dot"></div>
  <span id="status-text">Conectando...</span>
  <span id="sha-label"></span>
  <span id="fps-label"></span>
</div>
<div id="frame-container">
  <img id="frame" src="" alt="Cargando..." />
</div>
<div id="info">zapia-visor-proxy.vercel.app — sin caché</div>

<script>
const PROXY = "https://zapia-visor-proxy.vercel.app";
let lastSha = null;
let updateCount = 0;
let lastUpdateTime = Date.now();

const frameEl  = document.getElementById("frame");
const dotEl    = document.getElementById("dot");
const statusEl = document.getElementById("status-text");
const shaEl    = document.getElementById("sha-label");
const fpsEl    = document.getElementById("fps-label");

async function checkUpdate() {
  try {
    const r = await fetch(PROXY + "/api/sha?t=" + Date.now());
    if (!r.ok) throw new Error("HTTP " + r.status);
    const sha = await r.text();

    if (sha !== lastSha) {
      lastSha = sha;
      // Cargar la nueva imagen
      const newImg = new Image();
      newImg.onload = () => {
        frameEl.src = newImg.src;
        updateCount++;
        const now = Date.now();
        const elapsed = (now - lastUpdateTime) / 1000;
        lastUpdateTime = now;
        fpsEl.textContent = elapsed < 60 ? `↻ hace ${Math.round(elapsed)}s` : "";
        dotEl.classList.remove("offline");
        statusEl.textContent = "En vivo";
        shaEl.textContent = "SHA: " + sha;
      };
      newImg.onerror = () => {
        statusEl.textContent = "Error cargando imagen";
        dotEl.classList.add("offline");
      };
      newImg.src = PROXY + "/api/frame?sha=" + sha;
    }
  } catch (e) {
    dotEl.classList.add("offline");
    statusEl.textContent = "Sin señal (" + e.message + ")";
  }
}

// Polling cada 2 segundos
checkUpdate();
setInterval(checkUpdate, 2000);
</script>
</body>
</html>
