<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Zapia Visor — Live</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a; color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh; display: flex;
    flex-direction: column; align-items: center; padding: 10px;
  }
  #header {
    width: 100%; max-width: 960px;
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 10px;
  }
  h1 { font-size: 14px; color: #666; letter-spacing: 1px; text-transform: uppercase; }
  #selector { display: flex; gap: 6px; }
  .tab-btn {
    padding: 5px 14px; border-radius: 20px;
    border: 1px solid #333; background: #111; color: #555;
    font-size: 12px; cursor: pointer; transition: all 0.2s;
    font-family: 'Segoe UI', sans-serif;
  }
  .tab-btn.active { background: #e74c3c; border-color: #e74c3c; color: #fff; }
  .tab-btn:hover:not(.active) { border-color: #555; color: #aaa; }
  .badge {
    font-size: 9px; background: #333; padding: 1px 5px;
    border-radius: 8px; margin-left: 4px; color: #888;
  }
  .tab-btn.active .badge { background: rgba(255,255,255,0.2); color: #fff; }
  #status-bar {
    width: 100%; max-width: 960px;
    display: flex; gap: 10px; font-size: 11px; color: #555;
    margin-bottom: 8px; align-items: center;
  }
  #dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #2ecc71; flex-shrink: 0; animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
  #dot.offline { background: #e74c3c; animation: none; }
  #dot.lab { background: #f39c12; animation: pulse 1s infinite; }
  .panel { width: 100%; max-width: 960px; display: none; }
  .panel.active { display: block; }
  .frame-wrap {
    background: #111; border: 1px solid #1a1a1a;
    border-radius: 8px; overflow: hidden;
  }
  .frame-wrap img { width: 100%; height: auto; display: block; }
  #p2-metrics {
    background: #0d0d0d; border: 1px solid #1a1a1a;
    border-radius: 6px; padding: 10px 14px;
    margin-top: 8px; font-size: 11px; color: #555; line-height: 2;
  }
  #p2-metrics b { color: #888; }
  .g { color: #2ecc71 !important; }
  .o { color: #f39c12 !important; }
  .r { color: #e74c3c !important; }
  #footer { font-size: 10px; color: #222; margin-top: 8px; text-align: center; }
</style>
</head>
<body>

<div id="header">
  <h1>⚡ Zapia Visor</h1>
  <div id="selector">
    <button class="tab-btn active" id="btn1" onclick="switchPanel(1)">
      Pantalla 1 <span class="badge">OFICIAL</span>
    </button>
    <button class="tab-btn" id="btn2" onclick="switchPanel(2)">
      Pantalla 2 <span class="badge">CF WORKERS</span>
    </button>
  </div>
</div>

<div id="status-bar">
  <div id="dot"></div>
  <span id="status-text">Conectando...</span>
  <span id="latency-label"></span>
</div>

<!-- PANTALLA 1 — GitHub raw directo -->
<div id="panel1" class="panel active">
  <div class="frame-wrap">
    <img id="frame1" src="" alt="Cargando..." />
  </div>
</div>

<!-- PANTALLA 2 — CF Workers -->
<div id="panel2" class="panel">
  <div class="frame-wrap">
    <img id="frame2" src="" alt="Esperando frame..." />
  </div>
  <div id="p2-metrics">
    <b>⚡ Pantalla 2 — Cloudflare Workers</b><br>
    <span id="m-poll">SHA poll: <b>—</b></span> &nbsp;|&nbsp;
    <span id="m-frames">Frames: <b>0</b></span> &nbsp;|&nbsp;
    <span id="m-sha">SHA: <b>—</b></span>
  </div>
</div>

<div id="footer">rayzemartineztv.github.io/zapia-visor · P1: GitHub 2s · P2: CF Workers 400ms poll</div>

<script>
const RAW_P1    = "https://raw.githubusercontent.com/rayzemartineztv/zapia-visor/main/frame.png";
const CF_SHA    = "https://zapia-visor-p2.rayzecontacto.workers.dev/sha2";
const CF_FRAME  = "https://zapia-visor-p2.rayzecontacto.workers.dev/frame2";

const dot    = document.getElementById("dot");
const status = document.getElementById("status-text");
const latLbl = document.getElementById("latency-label");
const img1   = document.getElementById("frame1");
const img2   = document.getElementById("frame2");

let currentPanel = 1;
let shaP2 = null, framesP2 = 0;
let errP1 = 0, errP2 = 0;

function switchPanel(n) {
  currentPanel = n;
  document.getElementById("panel1").classList.toggle("active", n===1);
  document.getElementById("panel2").classList.toggle("active", n===2);
  document.getElementById("btn1").classList.toggle("active", n===1);
  document.getElementById("btn2").classList.toggle("active", n===2);
}

function cls(ms, g, o) { return ms<=g?"g":ms<=o?"o":"r"; }

// ── P1: img.src directo con timestamp cada 2s ─────────────────
let errP1count = 0;
function refreshP1() {
  const t0 = Date.now();
  const newSrc = RAW_P1 + "?t=" + t0;
  const tmp = new Image();
  tmp.onload = function() {
    img1.src = newSrc;
    errP1count = 0;
    if (currentPanel === 1) {
      dot.className = "";
      status.textContent = "En vivo";
      latLbl.textContent = "↻ " + (Date.now()-t0) + "ms";
    }
  };
  tmp.onerror = function() {
    if (++errP1count >= 3 && currentPanel === 1) {
      dot.className = "offline"; status.textContent = "Sin señal"; latLbl.textContent = "";
    }
  };
  tmp.src = newSrc;
}

// ── P2: poll SHA cada 400ms, si cambia → img.src directo ──────
let errP2count = 0;
async function refreshP2() {
  try {
    const t0 = Date.now();
    const r = await fetch(CF_SHA + "?t=" + t0, { cache: "no-store" });
    const sha = (await r.text()).trim();
    const cfMs = Date.now() - t0;
    if (!sha || sha === "none" || sha === shaP2) return;
    shaP2 = sha;
    framesP2++;
    // Cargar imagen via img.src directo (no blob, más compatible)
    const imgSrc = CF_FRAME + "?sha=" + sha + "&t=" + Date.now();
    const tmp = new Image();
    tmp.onload = function() {
      img2.src = imgSrc;
    };
    tmp.src = imgSrc;
    document.getElementById("m-poll").innerHTML  = "SHA poll: <b class='" + cls(cfMs,200,500) + "'>" + cfMs + "ms</b>";
    document.getElementById("m-frames").innerHTML = "Frames: <b>" + framesP2 + "</b>";
    document.getElementById("m-sha").innerHTML   = "SHA: <b>" + sha + "</b>";
    errP2count = 0;
    if (currentPanel === 2) {
      dot.className = "lab";
      status.textContent = "En vivo · CF Workers";
      latLbl.textContent = "⚡ " + cfMs + "ms";
    }
  } catch(e) {
    if (++errP2count >= 5 && currentPanel === 2) {
      dot.className = "offline"; status.textContent = "Sin señal P2"; latLbl.textContent = "";
    }
  }
}

// Arrancar
refreshP1();
refreshP2();
setInterval(refreshP1, 2000);
setInterval(refreshP2,  400);
</script>
</body>
</html>
