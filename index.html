<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Zapia Visor — Live</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;color:#fff;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh}
#tabs{display:flex;background:#0a0a1a;border-bottom:1px solid #1a1a3a;z-index:10;position:relative}
.tab{flex:1;padding:10px 0;text-align:center;cursor:pointer;font-size:12px;font-weight:600;letter-spacing:.5px;color:#556;transition:all .2s;border-bottom:3px solid transparent}
.tab.active{color:#fff;border-bottom-color:#f0a800}
.tab:hover:not(.active){color:#aaa}
#screens{width:100%;height:calc(100vh - 43px);position:relative}
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:stretch;background:#050510}
.screen.active{display:flex}
.canvas-wrap{position:relative;width:100%;height:100%}
canvas{display:block;width:100%;height:100%}
.hud{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.6);padding:5px 16px;border-radius:20px;
  font-size:11px;color:#aaa;letter-spacing:.3px;white-space:nowrap;pointer-events:none}
.badge{position:absolute;top:10px;left:12px;font-size:10px;font-weight:700;
  letter-spacing:.8px;padding:3px 10px;border-radius:12px;pointer-events:none;z-index:5}
.badge-p1{background:rgba(255,168,0,.18);color:#f0a800;border:1px solid #f0a80055}
.badge-p2{background:rgba(0,255,120,.18);color:#00ff88;border:1px solid #00ff8855}
.badge-p3{background:rgba(0,200,255,.13);color:#00dcff;border:1px solid #00dcff55}
/* P2 */
#p2-topbar{background:#0d0d1f;border-bottom:1px solid #1a1a3a;padding:7px 14px;
  display:flex;align-items:center;gap:10px;flex-shrink:0}
#p2-url{flex:1;background:#111;border:1px solid #222;border-radius:6px;
  padding:4px 10px;font-size:11px;color:#aaa;font-family:monospace;overflow:hidden;white-space:nowrap}
#p2-live{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:#00ff88;flex-shrink:0}
.dot{width:8px;height:8px;border-radius:50%;background:#00ff88;animation:pulse 1.2s ease infinite}
#p2-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#07070f;position:relative}
#p2-img{max-width:100%;max-height:100%;object-fit:contain;display:block}
#p2-bottombar{background:#0d0d1f;border-top:1px solid #1a1a3a;
  padding:5px 14px;display:flex;align-items:center;justify-content:space-between;
  font-size:10px;color:#445;flex-shrink:0}
#p2-status{color:#00ff88;font-weight:600}
#p2-spinner{display:flex;align-items:center;gap:8px;position:absolute;font-size:12px;color:#334;flex-direction:column}
.spin{width:28px;height:28px;border:2px solid #1a1a3a;border-top-color:#00ff88;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* VS */
#screen-vs{flex-direction:row!important}
.half{flex:1;height:100%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.divider{width:2px;background:linear-gradient(to bottom,transparent,#2a2a4a,transparent);flex-shrink:0}
/* P3 */
#terminal{position:absolute;top:48px;left:0;right:0;bottom:38px;padding:12px 16px;overflow-y:auto;
  font-family:'Courier New',monospace;font-size:11px;line-height:1.65;background:rgba(2,2,16,.88);color:#00dcff}
.t-line{white-space:pre-wrap;animation:fadeIn .15s ease}
.t-ok{color:#00ff88}.t-warn{color:#f0a800}.t-err{color:#ff5566}.t-dim{color:#334}.t-head{color:#fff;font-weight:bold}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="tabs">
  <div class="tab active" onclick="show('p1')">P1 — Canvas Dorado</div>
  <div class="tab"        onclick="show('p2')">P2 — Zapia Screen 🟢</div>
  <div class="tab"        onclick="show('vs')">Ambas VS</div>
  <div class="tab"        onclick="show('p3')">P3 — Worker Lab 🔬</div>
</div>
<div id="screens">
  <!-- P1 -->
  <div id="screen-p1" class="screen active">
    <div class="canvas-wrap">
      <canvas id="c1"></canvas>
      <div class="badge badge-p1">P1 · CANVAS NATIVO · 60FPS</div>
      <div class="hud" id="hud1">cargando…</div>
    </div>
  </div>
  <!-- P2 -->
  <div id="screen-p2" class="screen">
    <div id="p2-topbar">
      <div id="p2-live"><div class="dot"></div>LIVE</div>
      <div id="p2-url">conectando…</div>
      <div style="font-size:10px;color:#334;flex-shrink:0">Zapia Browser</div>
    </div>
    <div id="p2-img-wrap">
      <div id="p2-spinner"><div class="spin"></div>Cargando pantalla de Zapia…</div>
      <img id="p2-img" src="" alt="" style="max-width:100%;max-height:100%;object-fit:contain;display:none"/>
    </div>
    <div id="p2-bottombar">
      <span id="p2-status">⏳ Esperando captura…</span>
      <span id="p2-time"></span>
    </div>
  </div>
  <!-- VS -->
  <div id="screen-vs" class="screen">
    <div class="half">
      <canvas id="c3"></canvas>
      <div class="badge badge-p1" style="top:8px;left:8px;font-size:9px">P1 · DORADO 60FPS</div>
    </div>
    <div class="divider"></div>
    <div class="half" style="background:#07070f">
      <img id="p2-img-vs" src="" style="max-width:100%;max-height:100%;object-fit:contain" alt=""/>
      <div class="badge badge-p2" style="top:8px;left:8px;font-size:9px">P2 · ZAPIA SCREEN</div>
    </div>
  </div>
  <!-- P3 -->
  <div id="screen-p3" class="screen">
    <div class="canvas-wrap">
      <canvas id="c5"></canvas>
      <div class="badge badge-p3">P3 · WORKER LAB · CONSTRUCCIÓN 🔬</div>
      <div id="terminal"></div>
      <div class="hud">Reset KV → 20:00 hrs Santiago</div>
    </div>
  </div>
</div>
<script>
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  ['p1','p2','vs','p3'].forEach((k,i)=>{if(k===id)document.querySelectorAll('.tab')[i].classList.add('active')});
}
// Heart
function makeHeart(canvas,scheme,onFPS){
  const ctx=canvas.getContext('2d');
  let fn=0,lastT=0,fps=0,fc=0,ft=0;
  function resize(){canvas.width=canvas.offsetWidth*devicePixelRatio;canvas.height=canvas.offsetHeight*devicePixelRatio;}
  resize();window.addEventListener('resize',resize);
  function draw(ts){
    const dt=ts-lastT;lastT=ts;fc++;ft+=dt;
    if(ft>=600){fps=Math.round(fc/(ft/1000));fc=0;ft=0;}
    const W=canvas.width,H=canvas.height;
    ctx.fillStyle='rgba(5,5,16,.38)';ctx.fillRect(0,0,W,H);
    const beat=1+.08*Math.sin(fn*.18),angle=(fn*.018)%(2*Math.PI);
    const cx=W/2,cy=H/2+H*.03,sc=Math.min(W,H)*.105;
    const pts3=[],N=300;
    for(let i=0;i<=N;i++){
      const t=2*Math.PI*i/N;
      const x=16*Math.pow(Math.sin(t),3)*.3*beat;
      const y=(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))*.3*beat;
      const z=8*Math.sin(t)*Math.cos(t)*.3*beat;
      const rx=x*Math.cos(angle)+z*Math.sin(angle),rz=-x*Math.sin(angle)+z*Math.cos(angle);
      pts3.push([rx,y,rz]);
    }
    const proj=pts3.map(([x,y,z])=>{const d=500/(500+z*28);return[cx+x*d*sc,cy-y*d*sc];});
    const segs=[];for(let i=0;i<N;i++)segs.push([(pts3[i][2]+pts3[i+1][2])/2,i]);
    segs.sort((a,b)=>a[0]-b[0]);
    ctx.lineCap='round';
    for(const[mz,i]of segs){
      const d=Math.max(0,Math.min(1,(mz+3.5)/7));
      let r,g,b;
      if(scheme==='gold'){r=Math.round((175+80*Math.sin(fn*.038))*(0.22+.78*d));g=Math.round(d*d*160);b=Math.round((35+70*Math.sin(fn*.031))*(.18+.82*d));}
      else{r=Math.round(d*30);g=Math.round((140+80*Math.sin(fn*.038))*(0.22+.78*d));b=Math.round((200+55*Math.sin(fn*.031))*(.3+.7*d));}
      ctx.strokeStyle=`rgb(${r},${g},${b})`;
      ctx.lineWidth=Math.max(1,(1+3.5*d)*Math.min(W,H)/700);
      ctx.beginPath();ctx.moveTo(proj[i][0],proj[i][1]);ctx.lineTo(proj[i+1][0],proj[i+1][1]);ctx.stroke();
    }
    fn++;if(onFPS)onFPS(fps,dt);requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}
makeHeart(document.getElementById('c1'),'gold',(fps,dt)=>{
  document.getElementById('hud1').textContent=`${fps} fps · ${dt.toFixed(1)}ms · P1 canvas nativo`;
});
makeHeart(document.getElementById('c3'),'gold',null);
makeHeart(document.getElementById('c5'),'cyan',null);

// ── P2: lee pointer.txt de raw.githubusercontent.com ──
// pointer.txt contiene solo el timestamp del último screenshot
// screen_TIMESTAMP.jpg es el archivo real → nombre único = sin cache
const RAW = 'https://raw.githubusercontent.com/rayzemartineztv/zapia-visor/main';
const p2img    = document.getElementById('p2-img');
const p2imgVS  = document.getElementById('p2-img-vs');
const p2url    = document.getElementById('p2-url');
const p2status = document.getElementById('p2-status');
const p2time   = document.getElementById('p2-time');
const spinner  = document.getElementById('p2-spinner');
let lastPtr = '';

async function pollScreen(){
  try{
    // Leer pointer (nombre del archivo actual) — forzar sin cache con Date.now()
    const pr = await fetch(`${RAW}/pointer.txt?v=${Date.now()}`);
    if(!pr.ok) return;
    const ptr = (await pr.text()).trim();
    if(!ptr || ptr === lastPtr) return;
    lastPtr = ptr;

    // Leer meta
    try{
      const mr = await fetch(`${RAW}/screen_meta.json?v=${Date.now()}`);
      if(mr.ok){ const m=await mr.json(); p2url.textContent=m.url+' — '+m.title; }
    }catch(e){}

    // Cargar imagen — nombre único = sin cache garantizado
    const tmp = new Image();
    tmp.crossOrigin = 'anonymous';
    tmp.onload = ()=>{
      p2img.src = tmp.src;
      p2imgVS.src = tmp.src;
      p2img.style.display = 'block';
      spinner.style.display = 'none';
      p2status.textContent = '🟢 En vivo — ' + ptr;
      p2time.textContent = new Date().toLocaleTimeString('es-CL');
    };
    tmp.onerror = ()=>{ p2status.textContent = '⚠️ Error cargando imagen'; };
    tmp.src = `${RAW}/${ptr}`;
  }catch(e){ console.warn(e); }
}

pollScreen();
setInterval(pollScreen, 2500);

// ── P3 Terminal ──
const term=document.getElementById('terminal');
const SCRIPT=[
  {cls:'t-head',txt:'╔══════════════════════════════════════════╗'},
  {cls:'t-head',txt:'║   ZAPIA · WORKER LAB · EN CONSTRUCCIÓN  ║'},
  {cls:'t-head',txt:'╚══════════════════════════════════════════╝'},
  {cls:'t-dim', txt:'──────────────────────────────────────────'},
  {cls:'',txt:'$ cf kv create "zapia-visor-lab"'},
  {cls:'t-ok',txt:'  ✓ KV: ca719bf4746348908457aa0abd8386d6'},
  {cls:'',txt:'$ cf workers deploy zapia-visor-lab'},
  {cls:'t-ok',txt:'  ✓ zapia-visor-lab.rayzecontacto.workers.dev'},
  {cls:'',txt:'$ benchmark --configs 3 --duration 15s each'},
  {cls:'t-warn',txt:'  [1] 900x560 q88 → 15.5 KB/frame'},
  {cls:'t-warn',txt:'  [2] 480x300 q35 →  4.1 KB/frame'},
  {cls:'t-warn',txt:'  [3] 320x200 q25 →  2.2 KB/frame'},
  {cls:'t-err',txt:'  ✗ CF KV 429 — límite free agotado'},
  {cls:'',txt:'$ cron add --at "20:05 -04:00" verify_notify'},
  {cls:'t-ok',txt:'  ✓ Job: 2026-06-29 20:05 Santiago'},
  {cls:'t-dim',txt:'──────────────────────────────────────────'},
  {cls:'t-head',txt:'  ESTADO: Esperando reset KV → 20:00 hrs'},
  {cls:'t-warn',txt:'  Al resetear → benchmark → mejor FPS en vivo'},
  {cls:'t-dim',txt:'──────────────────────────────────────────'},
];
let si=0;
function runTerm(){
  if(si<SCRIPT.length){
    const d=document.createElement('div');d.className='t-line '+SCRIPT[si].cls;d.textContent=SCRIPT[si].txt;
    term.appendChild(d);term.scrollTop=term.scrollHeight;si++;
    setTimeout(runTerm,si<4?250:480);
  }else{setTimeout(()=>{si=0;term.innerHTML='';runTerm();},10000);}
}
setTimeout(runTerm,700);
</script>
</body>
</html>
