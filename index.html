<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Zapia Visor — Live</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a; color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh; display: flex;
    flex-direction: column; align-items: center; padding: 10px;
  }
  #header {
    width: 100%; max-width: 960px;
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 10px;
  }
  h1 { font-size: 14px; color: #666; letter-spacing: 1px; text-transform: uppercase; }
  #selector { display: flex; gap: 6px; }
  .tab-btn {
    padding: 5px 14px; border-radius: 20px;
    border: 1px solid #333; background: #111; color: #555;
    font-size: 12px; cursor: pointer; transition: all 0.2s;
    font-family: 'Segoe UI', sans-serif;
  }
  .tab-btn.active { background: #e74c3c; border-color: #e74c3c; color: #fff; }
  .tab-btn:hover:not(.active) { border-color: #555; color: #aaa; }
  .badge { font-size: 9px; background: #333; padding: 1px 5px; border-radius: 8px; margin-left: 4px; color: #888; }
  .tab-btn.active .badge { background: rgba(255,255,255,0.2); color: #fff; }
  #status-bar {
    width: 100%; max-width: 960px;
    display: flex; gap: 10px; font-size: 11px; color: #555;
    margin-bottom: 8px; align-items: center;
  }
  #dot { width: 7px; height: 7px; border-radius: 50%; background: #2ecc71; flex-shrink: 0; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
  .panel { width: 100%; max-width: 960px; display: none; }
  .panel.active { display: block; }

  /* Vista lado a lado */
  #panel-both {
    width: 100%; max-width: 960px;
    display: none;
    gap: 8px;
  }
  #panel-both.active { display: flex; }
  .side {
    flex: 1; min-width: 0;
    background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
  }
  .side-label {
    font-size: 10px; color: #555; text-align: center;
    padding: 5px; border-bottom: 1px solid #1a1a1a; text-transform: uppercase; letter-spacing: 1px;
  }
  .side-label.gold { color: #f39c12; }
  .side-label.blue { color: #3498db; }
  canvas { width: 100%; height: auto; display: block; background: #080818; }
  .metrics {
    background: #0d0d0d; border-top: 1px solid #111;
    padding: 6px 10px; font-size: 10px; color: #555;
    font-family: monospace; line-height: 1.8;
  }
  .metrics b { color: #999; }
  .g { color: #2ecc71 !important; }
  .o { color: #f39c12 !important; }
  #footer { font-size: 10px; color: #222; margin-top: 8px; text-align: center; }
</style>
</head>
<body>

<div id="header">
  <h1>⚡ Zapia Visor — Comparativa</h1>
  <div id="selector">
    <button class="tab-btn" id="btn1" onclick="switchPanel(1)">P1 <span class="badge">SOLO</span></button>
    <button class="tab-btn" id="btn2" onclick="switchPanel(2)">P2 <span class="badge">SOLO</span></button>
    <button class="tab-btn active" id="btnB" onclick="switchPanel(3)">Ambas <span class="badge">VS</span></button>
  </div>
</div>

<div id="status-bar">
  <div id="dot"></div>
  <span id="status-text">Cargando...</span>
  <span id="latency-label"></span>
</div>

<!-- P1 solo -->
<div id="panel1" class="panel">
  <div style="background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;overflow:hidden;">
    <canvas id="c1solo" width="900" height="520"></canvas>
  </div>
</div>

<!-- P2 solo -->
<div id="panel2" class="panel">
  <div style="background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;overflow:hidden;">
    <canvas id="c2solo" width="900" height="520"></canvas>
  </div>
</div>

<!-- AMBAS lado a lado -->
<div id="panel-both" class="active">
  <div class="side">
    <div class="side-label gold">⬛ Pantalla 1 — Canvas A</div>
    <canvas id="c1" width="440" height="480"></canvas>
    <div class="metrics">
      FPS: <b id="fps1" class="g">—</b> &nbsp;|&nbsp;
      Frame: <b id="frm1">0</b> &nbsp;|&nbsp;
      Render: <b id="rnd1">—</b>ms
    </div>
  </div>
  <div class="side">
    <div class="side-label blue">⬛ Pantalla 2 — Canvas B</div>
    <canvas id="c2" width="440" height="480"></canvas>
    <div class="metrics">
      FPS: <b id="fps2" class="g">—</b> &nbsp;|&nbsp;
      Frame: <b id="frm2">0</b> &nbsp;|&nbsp;
      Render: <b id="rnd2">—</b>ms
    </div>
  </div>
</div>

<div id="footer">
  P1 y P2 corren el mismo motor canvas · comparativa fluidez visual real · rayzemartineztv.github.io/zapia-visor
</div>

<script>
// ── Corazón 3D — motor compartido ────────────────────────────
function heartPoint(t) {
  return [
    16 * Math.pow(Math.sin(t), 3) * 0.3,
    (13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t)) * 0.3,
    8 * Math.sin(t) * Math.cos(t) * 0.3
  ];
}
function rotateY(x, y, z, a) {
  return [x*Math.cos(a)+z*Math.sin(a), y, -x*Math.sin(a)+z*Math.cos(a)];
}
function proj(x, y, z, cx, cy) {
  const sc = 500/(500+z*28);
  return [cx+x*sc*58, cy-y*sc*58, sc];
}

function makeHeart(canvasId, fpsId, frmId, rndId, speedMult, colorOffset, label) {
  const cv  = document.getElementById(canvasId);
  const ctx = cv.getContext('2d');
  const CW  = cv.width, CH = cv.height;
  let fn = 0, fps = 0, fpsFrames = 0, fpsTimer = performance.now();
  const STEPS = 340;

  function draw() {
    const now = performance.now();
    fpsFrames++;
    if (now - fpsTimer >= 500) {
      fps = Math.round(fpsFrames * 1000 / (now - fpsTimer));
      fpsFrames = 0; fpsTimer = now;
      if (fpsId) document.getElementById(fpsId).textContent = fps;
    }

    const t0 = performance.now();

    // Fade trail
    ctx.fillStyle = 'rgba(8,8,24,0.30)';
    ctx.fillRect(0, 0, CW, CH);

    const angle = (fn * 0.018 * speedMult + colorOffset) % (2*Math.PI);
    const beat  = 1.0 + 0.08 * Math.sin(fn * 0.18);
    const cx = CW/2, cy = CH/2 + 15;

    const pts3 = [];
    for (let i=0; i<=STEPS; i++) {
      const t = 2*Math.PI*i/STEPS;
      let [x,y,z] = heartPoint(t);
      [x,y,z] = rotateY(x*beat,y*beat,z*beat,angle);
      pts3.push([x,y,z]);
    }
    const pr = pts3.map(([x,y,z])=>proj(x,y,z,cx,cy));

    // Segmentos ordenados por Z
    const segs = pts3.slice(0,-1).map((_,i)=>[(pts3[i][2]+pts3[i+1][2])/2, i]);
    segs.sort((a,b)=>a[0]-b[0]);

    const rv = 175 + 80*Math.sin(fn*0.038 + colorOffset*3);
    const bv = 35  + 70*Math.sin(fn*0.031 + colorOffset*2);

    for (const [mz, i] of segs) {
      const d = Math.max(0, Math.min(1, (mz+3.5)/7));
      const r = Math.round(rv*(0.22+0.78*d));
      const g = Math.round(8*d);
      const b = Math.round(bv*(0.18+0.82*d));
      ctx.beginPath();
      ctx.strokeStyle = `rgb(${r},${g},${b})`;
      ctx.lineWidth   = Math.max(1, 1+3.5*d);
      ctx.moveTo(pr[i][0], pr[i][1]);
      ctx.lineTo(pr[i+1][0], pr[i+1][1]);
      ctx.stroke();
    }

    // Highlight frente
    for (const [mz,i] of segs.slice(-45)) {
      ctx.beginPath();
      ctx.arc(pr[i][0], pr[i][1], 1.5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,190,210,0.65)';
      ctx.fill();
    }

    // Partículas
    for (let k=0; k<14; k++) {
      const a2  = angle + k*Math.PI/7 + fn*0.045;
      const r2  = 5.8 + 0.9*Math.sin(fn*0.07+k);
      const oy  = 1.6*Math.sin(fn*0.055+k*0.8);
      const [ppx,ppy,psc] = proj(r2*Math.cos(a2), oy, r2*Math.sin(a2), cx, cy);
      const sz  = Math.max(1, (2+3*psc)*(0.5+0.5*Math.sin(fn*0.12+k)));
      const pr2 = Math.min(255, Math.round((55+k*14)*psc*1.5));
      const pg2 = Math.min(255, Math.round((22+k*18)*psc*1.5));
      const pb2 = Math.min(255, Math.round(Math.max(0,238-k*17)*psc*1.5));
      ctx.beginPath();
      ctx.arc(ppx, ppy, sz, 0, Math.PI*2);
      ctx.fillStyle = `rgb(${pr2},${pg2},${pb2})`;
      ctx.fill();
    }

    // Barra progreso
    const angDeg = (angle/(2*Math.PI)*360);
    const bw = angDeg/360*(CW-32);
    ctx.fillStyle = '#0a0a16';
    ctx.fillRect(16, CH-18, CW-32, 7);
    ctx.fillStyle = `rgb(${Math.round(rv*0.55)},12,${Math.round(bv*0.45)})`;
    ctx.fillRect(17, CH-17, Math.max(1,bw), 5);

    // Label
    const rndMs = (performance.now()-t0).toFixed(1);
    ctx.font = 'bold 12px monospace';
    ctx.fillStyle = '#000';
    ctx.fillText(`${label} | ${angDeg.toFixed(0)}° | ${fps}fps | ${rndMs}ms`, 13, 16);
    ctx.fillStyle = colorOffset===0 ? '#ffd700' : '#4fc3f7';
    ctx.fillText(`${label} | ${angDeg.toFixed(0)}° | ${fps}fps | ${rndMs}ms`, 12, 15);

    if (frmId) document.getElementById(frmId).textContent = fn;
    if (rndId) document.getElementById(rndId).textContent = rndMs;

    fn++;
    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
  return { getFps: ()=>fps };
}

// Instanciar ambos corazones con parámetros distintos
// P1: velocidad normal, color rojo/púrpura
makeHeart('c1',    'fps1','frm1','rnd1', 1.0, 0,    'P1 · CANVAS A');
makeHeart('c1solo','fps1','frm1','rnd1', 1.0, 0,    'P1 · CANVAS A');

// P2: misma velocidad para comparar justo, color azul/cian
makeHeart('c2',    'fps2','frm2','rnd2', 1.0, 1.047,'P2 · CANVAS B');
makeHeart('c2solo','fps2','frm2','rnd2', 1.0, 1.047,'P2 · CANVAS B');

// Status bar
let statusTick = 0;
setInterval(()=>{
  const f1 = document.getElementById('fps1').textContent;
  const f2 = document.getElementById('fps2').textContent;
  document.getElementById('dot').style.background = '#2ecc71';
  document.getElementById('status-text').textContent = `P1: ${f1}fps · P2: ${f2}fps · ambas en canvas`;
  document.getElementById('latency-label').textContent = '';
}, 600);

// ── Selector ────────────────────────────────────────────────
let currentPanel = 3;
function switchPanel(n) {
  currentPanel = n;
  document.getElementById('panel1').classList.toggle('active', n===1);
  document.getElementById('panel2').classList.toggle('active', n===2);
  document.getElementById('panel-both').classList.toggle('active', n===3);
  document.getElementById('btn1').classList.toggle('active', n===1);
  document.getElementById('btn2').classList.toggle('active', n===2);
  document.getElementById('btnB').classList.toggle('active', n===3);
}
</script>
</body>
</html>
