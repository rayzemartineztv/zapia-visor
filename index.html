<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Zapia Visor — Live</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
  }
  #header {
    width: 100%;
    max-width: 960px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  h1 { font-size: 14px; color: #666; letter-spacing: 1px; text-transform: uppercase; }
  #status-bar {
    width: 100%; max-width: 960px;
    display: flex; gap: 10px;
    font-size: 11px; color: #555;
    margin-bottom: 8px; align-items: center;
  }
  #dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #2ecc71; flex-shrink: 0;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
  #dot.offline { background: #e74c3c; animation: none; }
  .frame-wrap {
    width: 100%; max-width: 960px;
    background: #111; border: 1px solid #1a1a1a;
    border-radius: 8px; overflow: hidden;
  }
  .frame-wrap img { width: 100%; height: auto; display: block; }
  #footer {
    font-size: 10px; color: #222;
    margin-top: 8px; text-align: center;
  }
</style>
</head>
<body>

<div id="header">
  <h1>⚡ Zapia Visor — En Vivo</h1>
</div>

<div id="status-bar">
  <div id="dot"></div>
  <span id="status-text">Conectando...</span>
  <span id="latency-label"></span>
</div>

<div class="frame-wrap">
  <img id="frame" src="" alt="Cargando..." />
</div>

<div id="footer">rayzemartineztv.github.io/zapia-visor · actualización ~2s</div>

<script>
const RAW = "https://raw.githubusercontent.com/rayzemartineztv/zapia-visor/main/frame.png";
const dot    = document.getElementById("dot");
const status = document.getElementById("status-text");
const latLbl = document.getElementById("latency-label");
const img    = document.getElementById("frame");

let lastSize = 0;
let errors = 0;

async function refresh() {
  try {
    const t0 = Date.now();
    // Bust cache con timestamp
    const url = RAW + "?t=" + t0;
    const resp = await fetch(url, { cache: "no-store" });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const blob = await resp.blob();
    const ms = Date.now() - t0;
    const objUrl = URL.createObjectURL(blob);
    // Solo actualizar si hay cambio (tamaño diferente)
    if (blob.size !== lastSize) {
      const old = img.src;
      img.src = objUrl;
      if (old.startsWith("blob:")) URL.revokeObjectURL(old);
      lastSize = blob.size;
    }
    errors = 0;
    dot.className = "";
    status.textContent = "En vivo";
    latLbl.textContent = `↻ ${ms}ms · ${(blob.size/1024).toFixed(0)}KB`;
  } catch(e) {
    errors++;
    if (errors >= 3) {
      dot.className = "offline";
      status.textContent = "Sin señal";
      latLbl.textContent = "";
    }
  }
}

refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
